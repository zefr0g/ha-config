substitutions:
  name: veilleuse
  friendly_name: "Veilleuse"

packages:
  core: !include common/core.yaml
  wifi: !include common/wifi.yaml

esphome:
  name: ${name}

esp8266:
  board: d1_mini
  restore_from_flash: true

globals:
  - id: color_idx
    type: int
    restore_value: false
    initial_value: '0'
  - id: respiration_active
    type: bool
    restore_value: false
    initial_value: 'false'

light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: D2
    num_leds: 1
    name: "${friendly_name}"
    id: nightlight
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - pulse:
          name: "Respiration"
          transition_length: 2s
          update_interval: 2s
      - random:
          name: "Couleurs aléatoires"
          transition_length: 3s
          update_interval: 3s

# Decoded from Pronto codes — extended NEC, address 0x6B86
# Commands: power=0x12, bright+=0x1B, bright-=0x1A, color+=0x06, color-=0x04, middle=0x05
remote_receiver:
  pin:
    number: D5
    inverted: false
    mode:
      input: true
      pullup: true
  on_raw:
    then:
      - lambda: |-
          // Marks are negative, spaces positive in ESPHome raw (inverted=false, active-low receiver)
          // Full signal: size=68, x[0]=header mark (~-9ms), x[1]=header space (~+4.5ms)
          if (x.size() < 68) return;
          if (x[0] > -8000 || x[0] < -11000) return;
          if (x[1] < 3500 || x[1] > 5500) return;

          // Decode 4 bytes LSB-first; space > 1000µs = bit 1
          uint8_t bytes[4] = {};
          for (int b = 0; b < 4; b++)
            for (int i = 0; i < 8; i++) {
              int idx = 3 + 2 * (b * 8 + i);
              if (idx < (int)x.size() && x[idx] > 1000)
                bytes[b] |= (1 << i);
            }

          // Validate command vs its inverse, filter to this remote's address
          if ((uint8_t)(bytes[2] + bytes[3]) != 0xFF) return;
          if (bytes[0] != 0x86 || bytes[1] != 0x6B) return;

          uint8_t cmd = bytes[2];

          if (cmd == 0x12) {  // power — toggle
            if (id(nightlight).current_values.is_on()) id(respiration_active) = false;
            auto call = id(nightlight).make_call();
            call.set_state(!id(nightlight).current_values.is_on());
            call.perform();
            return;
          }

          auto call = id(nightlight).turn_on();

          if (cmd == 0x1B) {  // brightness+
            call.set_transition_length(300);
            call.set_brightness(min(1.0f, id(nightlight).current_values.get_brightness() + 0.15f));
          } else if (cmd == 0x1A) {  // brightness-
            call.set_transition_length(300);
            call.set_brightness(max(0.05f, id(nightlight).current_values.get_brightness() - 0.15f));
          } else if (cmd == 0x05) {  // milieu — toggle respiration
            id(respiration_active) = !id(respiration_active);
            if (id(respiration_active)) {
              call.set_effect("Respiration");
            } else {
              call.set_transition_length(1500);
              call.set_effect("None");
              switch (id(color_idx)) {
                case 0: call.set_rgb(1.0f, 0.4f, 0.0f); break;
                case 1: call.set_rgb(1.0f, 0.1f, 0.1f); break;
                case 2: call.set_rgb(0.2f, 0.0f, 1.0f); break;
                case 3: call.set_rgb(0.5f, 0.0f, 1.0f); break;
                case 4: call.set_rgb(1.0f, 1.0f, 1.0f); break;
              }
            }
          } else if (cmd == 0x06 || cmd == 0x04) {  // color+/-
            id(color_idx) = (cmd == 0x06) ? (id(color_idx) + 1) % 5 : (id(color_idx) + 4) % 5;
            call.set_transition_length(1500);
            call.set_effect("None");
            switch (id(color_idx)) {
              case 0: call.set_rgb(1.0f, 0.4f, 0.0f); break;  // orange chaud
              case 1: call.set_rgb(1.0f, 0.1f, 0.1f); break;  // rouge
              case 2: call.set_rgb(0.2f, 0.0f, 1.0f); break;  // bleu
              case 3: call.set_rgb(0.5f, 0.0f, 1.0f); break;  // violet
              case 4: call.set_rgb(1.0f, 1.0f, 1.0f); break;  // blanc
            }
          } else { return; }

          call.perform();
