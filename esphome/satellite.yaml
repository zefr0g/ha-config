substitutions:
  name: esp-satellite
  friendly_name: "ESP Satellite"

packages:
  core: !include common/core.yaml
  wifi: !include common/wifi.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: "2024.11.0"
  on_boot:
    - priority: 600
      then:
        - output.turn_off: max98357_sd
    - priority: -100
      then:
        - delay: 2s
        - speaker.volume_set:
            id: spk_max98357
            volume: !lambda "return id(volume_level).state / 100.0f;"
        - output.turn_on: max98357_sd
        - delay: 50ms
        - lambda: |-
            // Son de démarrage : deux notes montantes (C5 → G5, 125 ms chacune)
            const int SR = 16000;
            const int N  = SR / 8;           // 125 ms par note
            std::vector<uint8_t> buf(N * 4); // 2 notes × N samples × 2 octets
            for (int n = 0; n < 2; n++) {
              float freq = (n == 0) ? 523.25f : 783.99f;
              for (int i = 0; i < N; i++) {
                float env = (i < 400) ? i / 400.0f : (i > N - 400) ? (N - i) / 400.0f : 1.0f;
                int16_t s = (int16_t)(20000.0f * env * sinf(2.0f * 3.14159f * freq * i / SR));
                buf[(n * N + i) * 2    ] = s & 0xFF;
                buf[(n * N + i) * 2 + 1] = (s >> 8) & 0xFF;
              }
            }
            id(spk_max98357).play(buf.data(), buf.size());
        - delay: 400ms
        - output.turn_off: max98357_sd
        - light.turn_off: led_ring
        - micro_wake_word.start:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  hardware_uart: UART0

# ── I2S ──────────────────────────────────────────────────
i2s_audio:
  - id: i2s_mic
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO1

  - id: i2s_spk
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5

microphone:
  - platform: i2s_audio
    id: mic_inmp441
    i2s_audio_id: i2s_mic
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    channel: left

speaker:
  - platform: i2s_audio
    id: spk_max98357
    i2s_audio_id: i2s_spk
    i2s_dout_pin: GPIO7
    dac_type: external
    i2s_mode: primary
    channel: mono
    sample_rate: 16000
    bits_per_sample: 16bit
    buffer_duration: 500ms
    timeout: 500ms

output:
  - platform: gpio
    id: max98357_sd
    pin: GPIO8

globals:
  - id: va_state
    type: int
    initial_value: '0'

# ── Micro Wake Word ───────────────────────────────────────
micro_wake_word:
  microphone: mic_inmp441
  models:
    - model: okay_nabu
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# ── Sensors ───────────────────────────────────────────────
sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    update_interval: 30s

# ── Volume ────────────────────────────────────────────────
number:
  - platform: template
    name: "Volume"
    id: volume_level
    icon: mdi:volume-high
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    initial_value: 75
    step: 5
    mode: slider
    optimistic: true
    restore_value: true
    on_value:
      - speaker.volume_set:
          id: spk_max98357
          volume: !lambda "return x / 100.0f;"

# ── Voice Assistant ───────────────────────────────────────
voice_assistant:
  id: va
  microphone: mic_inmp441
  speaker: spk_max98357
  noise_suppression_level: 4
  auto_gain: 31dBFS
  use_wake_word: false

  on_listening:
    - globals.set:
        id: va_state
        value: '1'
    - light.turn_on:
        id: led_ring
        effect: "Ecoute"

  on_stt_vad_end:
    - globals.set:
        id: va_state
        value: '2'
    - light.turn_on:
        id: led_ring
        effect: "Traitement"

  on_tts_start:
    - output.turn_on: max98357_sd
    - globals.set:
        id: va_state
        value: '3'
    - light.turn_on:
        id: led_ring
        effect: "Parle"

  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - delay: 500ms
    - output.turn_off: max98357_sd
    - globals.set:
        id: va_state
        value: '0'
    - light.turn_off: led_ring
    - micro_wake_word.start:

  on_error:
    - voice_assistant.stop:
    - output.turn_off: max98357_sd
    - globals.set:
        id: va_state
        value: '4'
    - light.turn_on:
        id: led_ring
        effect: "Erreur"
    - delay: 3s
    - globals.set:
        id: va_state
        value: '0'
    - light.turn_off: led_ring
    - micro_wake_word.start:

# ── WS2812B Ring — GPIO15 ─────────────────────────────────
light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    chipset: WS2812
    rgb_order: GRB
    pin: GPIO15
    num_leds: 12
    name: "LED Ring"
    restore_mode: ALWAYS_OFF
    default_transition_length: 0s
    effects:
      - addressable_lambda:
          name: "Ecoute"
          update_interval: 30ms
          lambda: |-
            static int step = 0;
            int lit = (step / 3) % it.size();
            for (int i = 0; i < it.size(); i++) {
              it[i] = (i == lit) ? Color(0, 80, 255) : Color(0, 10, 40);
            }
            step++;

      - addressable_lambda:
          name: "Traitement"
          update_interval: 40ms
          lambda: |-
            static int step = 0;
            for (int i = 0; i < it.size(); i++) {
              float phase = (i * 6.28 / it.size()) + step * 0.15;
              uint8_t b = (uint8_t)((sin(phase) + 1.0) / 2.0 * 180);
              it[i] = Color(b, 0, b);
            }
            step++;

      - addressable_lambda:
          name: "Parle"
          update_interval: 30ms
          lambda: |-
            static int step = 0;
            for (int i = 0; i < it.size(); i++) {
              float phase = (i * 6.28 / it.size()) + step * 0.2;
              uint8_t g = (uint8_t)((sin(phase) + 1.0) / 2.0 * 200);
              it[i] = Color(0, g, 20);
            }
            step++;

      - addressable_lambda:
          name: "Erreur"
          update_interval: 200ms
          lambda: |-
            static bool on = false;
            on = !on;
            for (int i = 0; i < it.size(); i++) {
              it[i] = on ? Color(255, 0, 0) : Color(0, 0, 0);
            }

# ── Écran GC9A01 — SPI2 ──────────────────────────────────
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11

display:
  - platform: ili9xxx
    model: GC9A01A
    id: round_display
    cs_pin: GPIO10
    dc_pin: GPIO13
    reset_pin: GPIO14
    invert_colors: true
    rotation: 0
    update_interval: 100ms
    lambda: |-
      static int step = 0;
      const float PI = 3.14159265f;
      const int cx = 120, cy = 120;

      auto t = id(time_ha).now();
      if (!t.is_valid()) { step++; return; }

      int state = id(va_state);

      // ── Accent + background per state ─────────────────────
      // accent: full-brightness state color
      // dark:   very dim tint for background fill
      uint8_t ar, ag, ab, dr, dg, db;
      switch (state) {
        case 1: ar=0;   ag=160; ab=255; dr=0;  dg=5;  db=20; break; // écoute — cyan-blue
        case 2: ar=150; ag=50;  ab=240; dr=10; dg=0;  db=20; break; // traitement — violet
        case 3: ar=30;  ag=210; ab=80;  dr=0;  dg=14; db=5;  break; // parle — green
        case 4: ar=255; ag=55;  ab=20;  dr=20; dg=3;  db=0;  break; // erreur — red
        default:ar=60;  ag=110; ab=200; dr=4;  dg=7;  db=14; break; // veille — slate-blue
      }
      Color accent(ar, ag, ab);

      // ── State-tinted dark background ──────────────────────
      it.fill(Color(dr, dg, db));

      // ── Radial accent halo: bright at rim, fade inward ───
      // 40 concentric outline circles create a smooth gradient
      for (int r = 119; r >= 80; r--) {
        float frac = (r - 80.0f) / 39.0f;
        frac *= frac * 0.32f;
        it.circle(cx, cy, r,
          Color((uint8_t)(ar * frac), (uint8_t)(ag * frac), (uint8_t)(ab * frac)));
      }

      // ── 12 tick marks on rim ──────────────────────────────
      for (int i = 0; i < 12; i++) {
        float a = (i * 30.0f - 90.0f) * PI / 180.0f;
        float ca = cosf(a), sa = sinf(a);
        bool cardinal = (i % 3 == 0);
        int r1 = cardinal ? 97 : 104;
        Color tc = cardinal ? Color(110, 130, 165) : Color(45, 55, 75);
        for (int r = r1; r <= 111; r++)
          it.draw_pixel_at(cx + (int)(r * ca), cy + (int)(r * sa), tc);
      }

      // ── Second progress arc (fills clockwise each minute) ─
      static uint32_t last_sec_ms = 0;
      static int last_sec_v = -1;
      if (t.second != last_sec_v) { last_sec_ms = millis(); last_sec_v = t.second; }
      float frac_s = (millis() - last_sec_ms) / 1000.0f;
      if (frac_s > 1.0f) frac_s = 1.0f;
      float smooth_s = t.second + frac_s;
      if (smooth_s >= 60.0f) smooth_s = 59.99f;
      int arc_deg = (int)(smooth_s * 6.0f); // 0..359
      for (int d = 0; d <= arc_deg; d++) {
        float rad = (d - 90) * PI / 180.0f;
        float ca = cosf(rad), sa = sinf(rad);
        for (int r = 112; r <= 116; r++)
          it.draw_pixel_at(cx + (int)(r * ca), cy + (int)(r * sa), accent);
      }
      // Leading white glow dot at arc tip
      {
        float rad = (arc_deg - 90) * PI / 180.0f;
        float ca = cosf(rad), sa = sinf(rad);
        for (int r = 110; r <= 118; r++)
          it.draw_pixel_at(cx + (int)(r * ca), cy + (int)(r * sa), Color(255, 255, 255));
      }

      // ── Processing: rotating comet inside rim ─────────────
      if (state == 2) {
        int head = (step * 7) % 360;
        for (int d = 0; d < 200; d++) {
          int deg = (head - d + 360) % 360;
          float bright = (200 - d) / 200.0f;
          float rad = (deg - 90) * PI / 180.0f;
          float ca = cosf(rad), sa = sinf(rad);
          for (int r = 93; r <= 97; r++)
            it.draw_pixel_at(cx + (int)(r * ca), cy + (int)(r * sa),
              Color((uint8_t)(ar * bright), (uint8_t)(ag * bright), (uint8_t)(ab * bright)));
        }
      }

      // ── Digital time (center) ──────────────────────────────
      it.printf(cx, cy - 22, id(font_large), Color(228, 236, 252),
                TextAlign::CENTER, "%02d:%02d", t.hour, t.minute);
      it.printf(cx, cy + 14, id(font_small), Color(60, 90, 140),
                TextAlign::CENTER, ":%02d", t.second);

      // ── State label or date ───────────────────────────────
      const char* stxt = nullptr;
      switch (state) {
        case 1: stxt = "Ecoute...";     break;
        case 2: stxt = "Traitement..."; break;
        case 3: stxt = "Parle...";      break;
        case 4: stxt = "Erreur";        break;
      }
      if (stxt) {
        float p = 0.65f + 0.35f * (0.5f + 0.5f * sinf(step * 0.18f));
        it.printf(cx, cy + 36, id(font_small),
          Color((uint8_t)(ar * p), (uint8_t)(ag * p), (uint8_t)(ab * p)),
          TextAlign::CENTER, "%s", stxt);
      } else {
        const char* jours[] = {"dim","lun","mar","mer","jeu","ven","sam"};
        const char* mois[]  = {"jan","fev","mar","avr","mai","jun",
                                "jul","aou","sep","oct","nov","dec"};
        char dbuf[20];
        snprintf(dbuf, sizeof(dbuf), "%s %02d %s",
                 jours[t.day_of_week - 1], t.day_of_month, mois[t.month - 1]);
        it.printf(cx, cy + 36, id(font_small), Color(80, 100, 140),
                  TextAlign::CENTER, "%s", dbuf);
      }

      // ── WiFi fan (top) ────────────────────────────────────
      float dbm = id(wifi_signal_db).state;
      int wbars = (dbm > -55) ? 3 : (dbm > -67) ? 2 : (dbm > -80) ? 1 : 0;
      Color wdim(22, 28, 40);
      int wx = cx, wy = cy - 70;
      it.filled_rectangle(wx - 1, wy - 1, 3, 3, wbars > 0 ? Color(40, 100, 220) : wdim);
      for (int ai = 0; ai < 3; ai++) {
        int wr = 5 + ai * 4;
        Color wc = ai < wbars ? accent : wdim;
        for (int ang = -50; ang <= 50; ang += 7) {
          float rad = (ang - 90) * PI / 180.0f;
          it.draw_pixel_at(wx + (int)roundf(wr * cosf(rad)),
                           wy + (int)roundf(wr * sinf(rad)), wc);
        }
      }

      // ── Volume dots (bottom) ──────────────────────────────
      int vol_pct = (int)(id(volume_level).state);
      int vactive = (int)roundf(vol_pct / 100.0f * 8.0f);
      Color vdim(22, 28, 40);
      for (int i = 0; i < 8; i++) {
        int dx = cx - 25 + i * 7;
        it.filled_rectangle(dx - 2, cy + 76, 5, 5, i < vactive ? accent : vdim);
      }

      step++;

font:
  - file: "gfonts://Roboto Mono"
    id: font_large
    size: 38
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 17

time:
  - platform: homeassistant
    id: time_ha
