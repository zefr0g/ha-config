# Deploy to: /etc/wireplumber/wireplumber.conf.d/51-headless-bluez.conf
#
# Headless Pi fix for Bluetooth A2DP speaker mode.
#
# WirePlumber runs in the user (dd) session under the 'main' profile, which
# leaves monitor.bluez.seat-monitoring ENABLED. On this headless Pi the lingering
# user session has no logind *seat* (loginctl shows SEAT "-"), so the seat-gated
# bluez monitor never activates: no A2DP sink endpoint is registered with BlueZ,
# phones connect but find no audio profile and error out ("pairing/passkey" or
# silent no-op), and `pw-cli ls Device` shows no bluez device.
#
# Disabling seat-monitoring makes the bluez monitor run regardless of seat state.
# (The 'main-systemwide'/'main-embedded' profiles disable it via
# mixin.systemwide-session, but we run plain 'main'.)
#
# After deploying: systemctl --user restart wireplumber
wireplumber.profiles = {
  main = {
    monitor.bluez.seat-monitoring = disabled
  }
}
