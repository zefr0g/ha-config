schedule_entity_action:
  alias: Programmer action différée
  description: >-
    PREFERRED tool for any deferred action on a device (switch, light, valve,
    fan...). Always use this instead of HassStartTimer when the goal is to
    turn on or turn off an entity after a delay. Advantage: the scheduled
    action appears immediately on the dashboard. Accepts either the entity_id
    or the display name of the entity.
    To open/turn on NOW and close/turn off after a delay, use op=turn_off,
    open_now=true. To turn on after a delay use op=turn_on, open_now=false.
  mode: parallel
  max: 10
  icon: mdi:timer-cog
  fields:
    entity:
      name: Entité
      description: entity_id ou nom d'affichage de l'entité à piloter
      required: true
      selector:
        entity: {}
    op:
      name: Opération
      description: turn_on pour allumer/ouvrir, turn_off pour éteindre/fermer
      required: true
      default: turn_off
      selector:
        select:
          options:
            - turn_on
            - turn_off
    minutes:
      name: Délai (minutes)
      description: Nombre de minutes à attendre avant l'action
      required: true
      default: 1
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min
    open_now:
      name: Exécuter l'opération inverse immédiatement
      description: >-
        Si true, exécute l'opération inverse (turn_on si op=turn_off, et vice-versa)
        immédiatement avant de programmer l'action différée. Utile pour
        "ouvrir maintenant et fermer dans N minutes".
      required: false
      default: false
      selector:
        boolean: {}
  sequence:
    - variables:
        resolved: >-
          {%- set e = entity | string -%}
          {%- if '.' in e and states[e] is not none -%}
            {{ e }}
          {%- else -%}
            {%- set ns = namespace(found='') -%}
            {%- for s in states -%}
              {%- if s.name | lower == e | lower -%}{%- set ns.found = s.entity_id -%}{%- endif -%}
            {%- endfor -%}
            {{ ns.found if ns.found else e }}
          {%- endif -%}
        entry_id: "{{ now().timestamp() | int }}-{{ range(99999) | random }}"
        end_ts: "{{ (now() + timedelta(minutes=minutes | int)).timestamp() | int }}"
        opposite_op: "{{ 'turn_off' if op == 'turn_on' else 'turn_on' }}"
    - if:
        - condition: template
          value_template: "{{ open_now | default(false) }}"
      then:
        - action: >-
            {%- set d = resolved.split('.')[0] -%}
            {%- if d == 'valve' -%}
              {{ 'valve.open_valve' if opposite_op == 'turn_on' else 'valve.close_valve' }}
            {%- elif d == 'cover' -%}
              {{ 'cover.open_cover' if opposite_op == 'turn_on' else 'cover.close_cover' }}
            {%- else -%}
              homeassistant.{{ opposite_op }}
            {%- endif -%}
          continue_on_error: true
          target:
            entity_id: '{{ resolved }}'
    - action: input_text.set_value
      target:
        entity_id: input_text.scheduled_actions
      data:
        value: >-
          {%- set raw = states('input_text.scheduled_actions') -%}
          {%- set lst = raw | from_json if raw not in ['', 'unknown', 'unavailable'] else [] -%}
          {%- set new = {"i": entry_id, "n": entity[:20], "op": 0 if op == 'turn_off' else 1, "t": end_ts} -%}
          {{ (lst + [new]) | to_json }}
    - action: script.turn_on
      target:
        entity_id: script.delayed_entity_action
      data:
        variables:
          resolved: '{{ resolved }}'
          op: '{{ op }}'
          minutes: '{{ minutes | int }}'
          entry_id: '{{ entry_id }}'
delayed_entity_action:
  alias: Action différée (helper)
  description: >-
    Helper interne pour schedule_entity_action. Ne pas appeler directement.
    Attend le délai (annulable en retirant l'entrée de input_text.scheduled_actions),
    exécute l'action si toujours programmée, puis retire l'entrée.
  mode: parallel
  max: 20
  sequence:
    # Attend la fin du délai, ou l'annulation : si l'entrée disparaît de
    # input_text.scheduled_actions, le wait se termine immédiatement.
    - wait_template: >-
        {%- set raw = states('input_text.scheduled_actions') -%}
        {%- set lst = raw | from_json if raw not in ['', 'unknown', 'unavailable'] else [] -%}
        {{ entry_id not in (lst | map(attribute='i') | list) }}
      timeout:
        minutes: '{{ minutes | int }}'
      continue_on_timeout: true
    # wait.completed == true => l'entrée a été retirée => action annulée => on s'arrête.
    - if:
        - condition: template
          value_template: '{{ wait.completed }}'
      then:
        - stop: Action programmée annulée
    - action: >-
        {%- set d = resolved.split('.')[0] -%}
        {%- if d == 'valve' -%}
          {{ 'valve.open_valve' if op == 'turn_on' else 'valve.close_valve' }}
        {%- elif d == 'cover' -%}
          {{ 'cover.open_cover' if op == 'turn_on' else 'cover.close_cover' }}
        {%- else -%}
          homeassistant.{{ op }}
        {%- endif -%}
      continue_on_error: true
      target:
        entity_id: '{{ resolved }}'
    - action: input_text.set_value
      target:
        entity_id: input_text.scheduled_actions
      data:
        value: >-
          {%- set raw = states('input_text.scheduled_actions') -%}
          {%- set lst = raw | from_json if raw not in ['', 'unknown', 'unavailable'] else [] -%}
          {{ (lst | rejectattr('i', 'equalto', entry_id) | list) | to_json }}
cancel_scheduled_action:
  alias: Annuler action programmée
  description: >-
    Annule une ou plusieurs actions différées programmées via
    schedule_entity_action (celles affichées dans "En cours"). Passer le nom ou
    l'entity_id de l'entité pour annuler les actions la concernant, ou "tout"
    pour toutes les annuler. N'affecte PAS les minuteurs (timers) de l'assistant.
  mode: parallel
  max: 10
  icon: mdi:timer-off
  fields:
    entity:
      name: Entité
      description: >-
        Nom ou entity_id de l'entité dont annuler les actions programmées,
        ou "tout" / "all" pour toutes les annuler.
      required: true
      selector:
        text: {}
  sequence:
    # Retire les entrées correspondantes : chaque script.delayed_entity_action
    # en attente détecte la disparition de son entrée et s'arrête.
    - action: input_text.set_value
      target:
        entity_id: input_text.scheduled_actions
      data:
        value: >-
          {%- set raw = states('input_text.scheduled_actions') -%}
          {%- set lst = raw | from_json if raw not in ['', 'unknown', 'unavailable'] else [] -%}
          {%- set q = entity | string | lower | trim -%}
          {%- if q in ['tout', 'all', 'toutes', 'tous', '*'] -%}
            {{ [] | to_json }}
          {%- else -%}
            {%- set ns = namespace(kept=[]) -%}
            {%- for a in lst -%}
              {%- set n = a.n | string | lower -%}
              {%- if not (q in n or n in q) -%}
                {%- set ns.kept = ns.kept + [a] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.kept | to_json }}
          {%- endif -%}
