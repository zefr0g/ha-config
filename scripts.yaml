historique_appareil:
  alias: "Historique d'un appareil"
  description: >-
    Interroge l'historique on/off d'un appareil Home Assistant sur les dernières
    N heures. Le résultat est écrit dans input_text.historique_resultat.
  fields:
    entity_id:
      description: "Identifiant de l'entité HA (ex: switch.piscine_relais, valve.valve_controller_valve)"
      required: true
      selector:
        entity: {}
    hours:
      description: "Nombre d'heures d'historique à consulter (défaut: 24)"
      default: 24
      selector:
        number:
          min: 1
          max: 168
  sequence:
    - service: shell_command.get_entity_history
      data:
        entity_id: "{{ entity_id }}"
        hours: "{{ hours | default(24) }}"
    - delay: "00:00:04"
  mode: single

