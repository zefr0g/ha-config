title: Contrôle
kiosk_mode:
  admin_settings:
    hide_header: false
  user_settings:
    - users:
        - tablet
      hide_header: true
      kiosk: true
views:
  - path: default_view
    title: Contrôle
    cards:

      # ─── Navigation ───────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: action
                icon: mdi:home
                icon_color: blue
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-playground
                hold_action:
                  action: navigate
                  navigation_path: /config/dashboards
              - type: action
                icon: mdi:shield-home
                icon_color: red
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-alarme
              - type: action
                icon: mdi:doorbell-video
                icon_color: purple
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-interphone
              - type: action
                icon: mdi:pool
                icon_color: cyan
                tap_action:
                  action: navigate
                  navigation_path: /dashboard-piscine
              - type: action
                icon: mdi:thermometer
                icon_color: green
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-temperatures
              - type: action
                icon: mdi:cctv
                icon_color: teal
                tap_action:
                  action: navigate
                  navigation_path: /lovelace-video
            card_mod:
              style: |
                ha-card {
                  --chip-box-shadow: none;
                  --chip-background: rgba(var(--rgb-primary-text-color), 0.05);
                  margin-bottom: 4px;
                }

      # ─── Télévision ───────────────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Télévision
          - type: custom:mushroom-media-player-card
            entity: media_player.dd_tv
            use_media_info: true
            use_media_artwork: true
            show_volume_level: true
            media_controls:
              - on_off
              - play_pause
              - previous
              - next
            volume_controls:
              - volume_mute
              - volume_set
              - volume_buttons
            collapsible_controls: false
          - type: custom:mushroom-select-card
            entity: input_select.chaine_tnt
            name: Chaîne TNT
            icon: mdi:television-play
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:television-play
                icon_color: orange
                content: Wake TV
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wake_on_lan_40_16_3b_48_95_26
              - type: template
                icon: mdi:desktop-classic
                icon_color: indigo
                content: Wake dd-room
                tap_action:
                  action: perform-action
                  perform_action: wake_on_lan.send_magic_packet
                  data:
                    mac: d4:3d:7e:f5:4a:5d
            card_mod:
              style: |
                ha-card {
                  --chip-spacing: 4px;
                  padding: 0 8px 8px 8px !important;
                }

      # ─── Climatisation ────────────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Climatisation
          - type: custom:mushroom-climate-card
            entity: climate.mitsusalon_mitsusalon
            name: Salon
            show_temperature_control: true
            hvac_modes:
              - 'off'
              - cool
              - heat
              - fan_only
              - dry
              - auto
          - type: custom:mushroom-select-card
            entity: select.vertical_vane
            name: Volet vertical Salon
            icon: mdi:arrow-up-down
          - type: custom:mushroom-climate-card
            entity: climate.mitsucouloir_mitsucouloir
            name: Couloir
            show_temperature_control: true
            hvac_modes:
              - 'off'
              - cool
              - heat
              - fan_only
              - dry
              - auto
          - type: custom:mushroom-select-card
            entity: select.mitsucouloir_vertical_vane
            name: Volet vertical Couloir
            icon: mdi:arrow-up-down

      # ─── Prises & Éclairages ──────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Prises & Éclairages
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: switch.smart_switch_2010272205356751803548e1e939c748_outlet
                name: Aquarium
                icon: mdi:fish
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: switch.matter_over_wifi_smart_switch
                name: Prise couloir
                icon: mdi:power-socket-fr
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: switch.pc_salon_outlet
                name: Prise Salon
                icon: mdi:power-socket-fr
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: light.yeelight_stripe_0x4553435
                name: Lumière Placard
                icon: mdi:led-strip
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: light.wled_outside
                name: Guirlande Jardin
                icon: mdi:string-lights
                tap_action:
                  action: toggle

      # ─── Extérieur ────────────────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Extérieur
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-cover-card
                entity: cover.awning_0001
                name: Store banne
                show_buttons_control: true
              - type: custom:mushroom-entity-card
                entity: valve.valve_controller_valve
                name: Vanne arrosage
                icon: mdi:water-pump
                tap_action:
                  action: toggle

      # ─── Eau chaude ───────────────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Eau chaude
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-entity-card
                entity: switch.manubal
                name: Ballon (manuel)
                icon: mdi:water-boiler
                tap_action:
                  action: toggle
              - type: custom:mushroom-entity-card
                entity: sensor.msunpv_manubal
                name: MSunPV état
                icon: mdi:solar-power-variant

      # ─── Satellite ────────────────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-title-card
            title: Satellite
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-light-card
                entity: light.satellite_led_ring
                name: LED Ring
                use_light_color: true
                tap_action:
                  action: toggle
              - type: custom:mushroom-number-card
                entity: number.esp_satellite_volume
                name: Volume
                icon: mdi:volume-high
                display_mode: slider
