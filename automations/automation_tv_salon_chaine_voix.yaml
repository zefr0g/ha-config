            "rmc story": "23 - RMC Story", "23": "23 - RMC Story",
            "rmc découverte": "24 - RMC Découverte", "rmc decouverte": "24 - RMC Découverte", "24": "24 - RMC Découverte",
            "rmc life": "25 - RMC Life", "25": "25 - RMC Life",
            "paris première": "26 - Paris Première", "paris premiere": "26 - Paris Première", "26": "26 - Paris Première"
          } %}
          {{ map.get(ch, states('input_select.chaine_tnt')) }}
