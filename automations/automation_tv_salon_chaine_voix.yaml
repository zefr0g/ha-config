            "bfm tv": "13 - BFM TV", "bfm": "13 - BFM TV", "treize": "13 - BFM TV", "13": "13 - BFM TV",
            "cnews": "14 - CNews", "c news": "14 - CNews", "quatorze": "14 - CNews", "14": "14 - CNews",
            "lci": "15 - LCI", "quinze": "15 - LCI", "15": "15 - LCI",
            "france info": "16 - France Info", "franceinfo": "16 - France Info", "seize": "16 - France Info", "16": "16 - France Info",
            "cstar": "17 - CStar", "c star": "17 - CStar", "17": "17 - CStar",
            "t18": "18 - T18", "18": "18 - T18",
            "novo": "19 - Novo 19", "novo 19": "19 - Novo 19", "19": "19 - Novo 19",
