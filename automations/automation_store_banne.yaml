alias: Store banne — Fermer (vent fort ou coucher du soleil)
description: >-
  Ferme le store banne automatiquement si les rafales dépassent 40 km/h ou au
  coucher du soleil.
triggers:
  - entity_id:
      - sensor.wind_max_10min
    above: 40
    for:
      hours: 0
      minutes: 2
      seconds: 0
      milliseconds: 0
    id: vent_fort
    trigger: numeric_state
  - event: sunset
    id: coucher_soleil
    trigger: sun
conditions:
  - condition: state
    entity_id: cover.awning_0001
    state: open
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: vent_fort
        sequence:
          - target:
              entity_id: cover.awning_0001
            action: cover.close_cover
          - data:
              title: Store banne
              message: >-
                Fermé automatiquement — rafales à {{
                states("sensor.station_meteo_rafale_vent") | round(0) }} km/h
            action: notify.mobile_app_pixel_7a
      - conditions:
          - condition: trigger
            id: coucher_soleil
        sequence:
          - target:
              entity_id: cover.awning_0001
            action: cover.close_cover
mode: single
