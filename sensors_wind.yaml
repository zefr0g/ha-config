# Statistics sensors for wind — 10-minute rolling window
# Add to configuration.yaml:
#   sensor: !include sensors_wind.yaml
# (or append to an existing sensor list include)

- platform: statistics
  name: "Wind Average 10min"
  unique_id: wind_average_10min
  entity_id: sensor.weather_station_wind_speed
  state_characteristic: mean
  max_age:
    minutes: 10

- platform: statistics
  name: "Wind Max 10min"
  unique_id: wind_max_10min
  entity_id: sensor.weather_station_wind_gust
  state_characteristic: value_max
  max_age:
    minutes: 10
